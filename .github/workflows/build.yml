name: Build Unboxer IPA

on:
  workflow_dispatch: # Manual trigger ONLY

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Xcode Environment
        run: sudo xcode-select -s /Applications/Xcode_15.2.app || sudo xcode-select -s /Applications/Xcode.app
      
      - name: Generate Xcode Project (if needed)
        run: |
          # If we use XcodeGen in the future
          if [ -f "project.yml" ]; then
            brew install xcodegen
            xcodegen generate
          fi
          
      - name: Build Unsigned App
        run: |
          xcodebuild clean build \
            -project Unboxer.xcodeproj \
            -scheme Unboxer \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            CONFIGURATION_BUILD_DIR="${PWD}/build"
            
      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/Unboxer.app Payload/
          zip -r Unboxer.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unboxer-IPA
          path: Unboxer.ipa
