name: Build and Release Unboxer IPA

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version Number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write # Essential for creating a Release

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Xcode Environment
        run: sudo xcode-select -s /Applications/Xcode_15.2.app || sudo xcode-select -s /Applications/Xcode.app
      
      - name: Generate Xcode Project (if needed)
        run: |
          if [ -f "project.yml" ]; then
            brew install xcodegen
            xcodegen generate
          fi
          
      - name: Build Unsigned App
        run: |
          set +e
          xcodebuild clean build \
            -project Unboxer.xcodeproj \
            -scheme Unboxer \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            CONFIGURATION_BUILD_DIR="${PWD}/build" > build.log 2>&1
          
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::Build Failed! Extracting compiler errors..."
            grep -i -A 3 -B 3 "error:" build.log
            echo "=== FULL LOG TAIL ==="
            tail -n 100 build.log
            exit $EXIT_CODE
          fi
          set -e
            
      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/Unboxer.app Payload/
          zip -qr Unboxer.ipa Payload
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Unboxer Release v${{ github.event.inputs.version }}
          files: Unboxer.ipa
          draft: false
          prerelease: false
          generate_release_notes: true
