name: Build RustBridge XCFramework

on:
  workflow_dispatch:

jobs:
  build-rust-bridge:
    runs-on: macos-14
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Make script executable
        run: chmod +x Unboxer/Scripts/build_rust_bridge.sh

      - name: Build RustBridge XCFramework
        run: ./Unboxer/Scripts/build_rust_bridge.sh

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Unboxer/Dependencies/RustBridge.xcframework
          git add Unboxer/Dependencies/OpenSSL.xcframework
          git commit -m "chore: Rebuild and thin XCFrameworks from source" || echo "No changes to commit"
          git push
