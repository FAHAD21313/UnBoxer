name: Build Custom Rust Core

on:
  push:
    paths:
      - 'Unboxer/Scripts/build_rust_bridge.sh'
      - 'Unboxer/Scripts/minimuxer_ffi.patch'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build-rust-core:
    runs-on: macos-latest
    steps:
      - name: Checkout Unboxer Repository
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, aarch64-apple-ios-sim

      - name: Make Build Script Executable
        run: chmod +x Unboxer/Scripts/build_rust_bridge.sh

      - name: Run Custom Rust Core Factory
        run: |
          cd Unboxer/Scripts
          ./build_rust_bridge.sh

      - name: Upload RustBridge.xcframework Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RustBridge.xcframework
          path: Unboxer/Scripts/minimuxer/RustBridge.xcframework
          retention-days: 7

